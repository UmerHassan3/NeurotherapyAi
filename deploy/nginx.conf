server {
    listen 80;
    server_name YOUR_EC2_PUBLIC_IP;   # replace with your IP or domain

    # ── React frontend (static build) ─────────────────────────────────────────
    root /var/www/neurotherapy/dist;
    index index.html;

    # React Router: unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Node.js backend (/api/*) ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:5001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Python FastAPI AI service (/ai-api/* → strip prefix → :8000) ─────────
    location /ai-api/ {
        rewrite ^/ai-api/(.*) /$1 break;
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
